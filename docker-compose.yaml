services:
  db:
    image: postgres:16-alpine
    container_name: pulse_db
    restart: always
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - pulse_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: pulse_web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - db

volumes:
  pulse_data:
